name: Internal Logic Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
jobs:
  test-logic:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build project (compile TypeScript)
        run: npm run build

      - name: Verify dist exists
        run: test -f dist/wherenpm.js

      - name: Internal logic verification
        run: |
          export SYSTEM_PREFIX="$(npm config get prefix)"
          export SYSTEM_NPM="$(which npm)"
          node -e "
            const { getNpmPrefix } = require('./dist/wherenpm.js');
            const { resolve } = require('path');
            const { realpathSync, existsSync } = require('fs');

            const prefix = getNpmPrefix();
            const sysPrefix = process.env.SYSTEM_PREFIX;
            const sysNpm    = process.env.SYSTEM_NPM;

            console.log('getNpmPrefix():', prefix);
            console.log('system prefix: ', sysPrefix);

            if (prefix !== sysPrefix) {
              console.error('FAIL: Prefix mismatch');
              process.exit(1);
            }

            const expectedNpm = resolve(prefix, 'bin', 'npm');
            console.log('Expected npm at:', expectedNpm);
            if (!existsSync(expectedNpm)) {
              console.error('FAIL: npm binary not found under prefix');
              process.exit(1);
            }

            const realExpected = realpathSync(expectedNpm);
            const realSystem   = realpathSync(sysNpm);
            console.log('Real expected npm:', realExpected);
            console.log('Real system npm :', realSystem);

            if (realExpected !== realSystem) {
              console.error('FAIL: npm executable path mismatch');
              process.exit(1);
            }

            console.log('PASS: All internal logic checks passed.');
          "

      - name: Auto-commit dist if changed
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'ci: update dist [skip ci]'
          file_pattern: 'dist/**'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
