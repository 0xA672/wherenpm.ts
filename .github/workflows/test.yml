name: Smoke Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Verify dist exists
        run: test -f dist/index.js

      - name: Compare getNpmPrefix with system npm prefix
        run: |
          SYSTEM_PREFIX=$(npm config get prefix)
          echo "System reported prefix: $SYSTEM_PREFIX"
          CODE_PREFIX=$(node -e "
            const { getNpmPrefix } = require('./dist/index.js');
            console.log(getNpmPrefix());
          ")
          echo "Code returned prefix : $CODE_PREFIX"
          if [ "$SYSTEM_PREFIX" != "$CODE_PREFIX" ]; then
            echo "ERROR: prefixes do not match"
            exit 1
          else
            echo "OK: prefixes match"
          fi
